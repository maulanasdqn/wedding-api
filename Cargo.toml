[package]
name = "wedding-api"
version = "0.1.0"
edition = "2021"

[dependencies]
rocket = { version = "0.5", features = ["json"] }
rocket_cors = { version = "0.6.0", default-features = false }
tokio = { version = "1", features = ["full"] }
tokio-postgres = "0.7.11"
sqlx = { version = "0.8.2", features = ["postgres", "runtime-tokio-native-tls", "migrate"] }
aws-config = {version = "1.1.1", features = ["behavior-version-latest"] }
aws-sdk-s3 = {version = "1.14.1", features = ["behavior-version-latest"] }
aws-credential-types = "0.57.1"
aws-types = "0.57.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
validator = { version = "0.19.0", features = ["derive"] }
dotenv = "0.15.0"
uuid = { version = "1.11.0", features = ["v4"] }
safe-regex = "0.3.0"
openssl = { version = "0.10", features = ["vendored"] }
